codecov:
  require_ci_to_pass: true
comment:
  behavior: default
  layout: reach,diff,flags,tree,reach
  show_carryforward_flags: false
coverage:
  precision: 2
  range:
  - 60.0
  - 80.0
  round: down
  status:
    changes: false
    default_rules:
      flag_coverage_not_uploaded_behavior: include
    patch: true
    project:
      default:
        # Tolerate sub-statement rounding noise (e.g. branch-coverage merge
        # differences across the test matrix) so a ~0.01% wobble doesn't fail
        # the gate; real regressions still trip it.
        threshold: 1%
github_checks:
  annotations: true
slack_app: true
fixes:
   - "/home/runner/work/pymox/pymox::"
