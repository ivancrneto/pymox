name: pymox tests

on:
  pull_request:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "pypy3.10"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests and collect coverage
        run: pytest --cov=mox --cov-branch --cov-report=xml test

      - name: Upload coverage to Codecov
        if: success() && github.repository == 'ivancrneto/pymox'
        uses: codecov/codecov-action@v5
        with:
          flags: pymox-tests-${{ matrix.python-version }}
          # Best-effort: a missing token or a Codecov outage should not fail the
          # build. Set the CODECOV_TOKEN repo secret to enable uploads. Flip
          # this back to true once the secret is in place if you want strictness.
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,lint]
      - name: Run mypy
        run: mypy
